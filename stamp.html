<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방문 인증 · 전주시 자전거 여권</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1208;--paper:#f5efe3;--aged:#e8dcc8;--seal:#c0392b;--gold:#b8860b;--green:#2d6a4f;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Noto Sans KR',sans-serif;padding:24px 16px;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 15% 85%,rgba(192,57,43,.07) 0%,transparent 40%),radial-gradient(circle at 85% 15%,rgba(184,134,11,.09) 0%,transparent 40%);pointer-events:none;}

  .card{background:white;border-radius:12px;padding:44px 34px 34px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 48px rgba(26,18,8,.14),0 0 0 1px var(--aged);position:relative;}
  .card::before{content:'';position:absolute;top:10px;left:10px;right:10px;bottom:10px;border:1px solid rgba(232,220,200,.55);border-radius:8px;pointer-events:none;}

  .state{display:none;}.state.active{display:block;}
  .spinner{width:44px;height:44px;border:3px solid var(--aged);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 18px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:.88rem;color:#7a6a50;}

  .stamp-wrap{position:relative;display:inline-block;margin-bottom:18px;}
  .stamp-icon{width:90px;height:90px;background:var(--seal);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;margin:0 auto;box-shadow:0 4px 20px rgba(192,57,43,.35);animation:stampIn .5s .2s cubic-bezier(.34,1.56,.64,1) both;position:relative;}
  @keyframes stampIn{from{opacity:0;transform:scale(.3) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}
  .stamp-icon::after{content:'';position:absolute;inset:-5px;border:2.5px dashed rgba(192,57,43,.3);border-radius:50%;animation:spinSlow 8s linear infinite;}
  @keyframes spinSlow{to{transform:rotate(360deg)}}
  .confetti{position:absolute;top:50%;left:50%;pointer-events:none;}
  .confetti span{position:absolute;width:6px;height:6px;border-radius:50%;animation:burst .6s .3s cubic-bezier(0,.9,.57,1) both;}
  .confetti span:nth-child(1){background:var(--gold);--angle:0deg}.confetti span:nth-child(2){background:var(--seal);--angle:45deg}.confetti span:nth-child(3){background:var(--gold);--angle:90deg}.confetti span:nth-child(4){background:var(--green);--angle:135deg}.confetti span:nth-child(5){background:var(--gold);--angle:180deg}.confetti span:nth-child(6){background:var(--seal);--angle:225deg}.confetti span:nth-child(7){background:var(--gold);--angle:270deg}.confetti span:nth-child(8){background:var(--green);--angle:315deg}
  @keyframes burst{from{transform:rotate(var(--angle)) translateY(0) scale(0);opacity:1}to{transform:rotate(var(--angle)) translateY(-58px) scale(1);opacity:0}}

  .badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 14px;font-size:.74rem;font-weight:500;margin-bottom:12px;animation:fadeUp .4s .5s both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .badge-new{background:#e8f5e9;color:var(--green);border:1px solid #a5d6a7;}.badge-new::before{content:'✓ ';}
  .badge-dup{background:#fff3e0;color:#e65100;border:1px solid #ffcc80;}
  .loc-name{font-family:'Noto Serif KR',serif;font-size:1.5rem;font-weight:700;color:var(--ink);margin-bottom:4px;animation:fadeUp .4s .6s both;}
  .loc-desc{font-size:.81rem;color:#7a6a50;margin-bottom:5px;animation:fadeUp .4s .7s both;}
  .visitor-label{font-size:.79rem;color:#aaa;margin-bottom:14px;animation:fadeUp .4s .75s both;}
  .visitor-label strong{color:#7a6a50;}
  .stamp-time{font-size:.72rem;color:#bbb;letter-spacing:.04em;margin-bottom:18px;animation:fadeUp .4s .8s both;}

  .course-section{animation:fadeUp .4s .85s both;margin-bottom:16px;}
  .course-section-label{font-size:.73rem;color:#7a6a50;letter-spacing:.08em;margin-bottom:8px;text-align:left;}
  .course-cards{display:flex;flex-direction:column;gap:7px;}
  .course-card{background:var(--paper);border:1px solid var(--aged);border-radius:8px;padding:11px 13px;text-align:left;}
  .course-card.completed{border-color:rgba(184,134,11,.45);background:linear-gradient(135deg,#fffbef,var(--paper));}
  .cc-header{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
  .cc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .cc-name{font-family:'Noto Serif KR',serif;font-size:.87rem;font-weight:600;color:var(--ink);flex:1;}
  .cc-done-chip{font-size:.64rem;background:var(--gold);color:white;padding:2px 7px;border-radius:8px;}
  .cc-bar-row{display:flex;align-items:center;gap:7px;}
  .cc-bar{flex:1;height:5px;background:var(--aged);border-radius:3px;overflow:hidden;}
  .cc-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--seal));transition:width 1s .9s cubic-bezier(.16,1,.3,1);width:0%;}
  .cc-bar-label{font-size:.7rem;color:#7a6a50;white-space:nowrap;}
  .spot-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px;}
  .spot-chip{font-size:.62rem;padding:2px 7px;border-radius:8px;border:1px solid var(--aged);color:#7a6a50;background:white;}
  .spot-chip.done{background:#e8f5e9;border-color:#a5d6a7;color:var(--green);}
  .spot-chip.cur{background:rgba(192,57,43,.08);border-color:rgba(192,57,43,.3);color:var(--seal);font-weight:600;}

  .btn-mypage{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--ink);color:white;border:none;border-radius:8px;font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:600;cursor:pointer;letter-spacing:.05em;animation:fadeUp .4s 1s both;transition:background .2s;text-decoration:none;}
  .btn-mypage:hover{background:var(--seal);}
  .btn-mypage .arr{transition:transform .2s;}
  .btn-mypage:hover .arr{transform:translateX(3px);}

  .err-icon{font-size:2.8rem;margin-bottom:14px;}
  #state-error h2{font-family:'Noto Serif KR',serif;font-size:1.1rem;color:var(--ink);margin-bottom:7px;}
  #state-error p{font-size:.82rem;color:#7a6a50;margin-bottom:16px;}
  .btn-sec{display:inline-block;padding:9px 20px;border:1px solid var(--aged);border-radius:6px;font-size:.82rem;color:#7a6a50;text-decoration:none;transition:background .2s;}
  .btn-sec:hover{background:var(--aged);}
</style>
</head>
<body>
<div class="card">
  <div class="state active" id="state-loading">
    <div class="spinner"></div>
    <p class="loading-text">인증 준비 중...</p>
  </div>
  <div class="state" id="state-success">
    <div class="stamp-wrap">
      <div class="stamp-icon" id="stamp-emoji">🏮</div>
      <div class="confetti"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    </div>
    <div id="badge-wrap"></div>
    <div class="loc-name" id="loc-name-text"></div>
    <div class="loc-desc" id="loc-desc-text"></div>
    <div class="visitor-label" id="visitor-label"></div>
    <div class="stamp-time" id="stamp-time-text"></div>
    <div class="course-section" id="course-section" style="display:none">
      <div class="course-section-label">📍 코스 진행 현황</div>
      <div class="course-cards" id="course-cards"></div>
    </div>
    <a class="btn-mypage" href="mypage.html"><span>📖 마이페이지</span><span class="arr">→</span></a>
  </div>
  <div class="state" id="state-error">
    <div class="err-icon">⚠️</div>
    <h2>오류</h2>
    <p id="error-msg">올바른 QR코드를 스캔해주세요.</p>
    <a class="btn-sec" href="index.html">← 메인으로</a>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,updateDoc,collection,getDocs,increment}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyAW13Cf2qQnsGWYiAdz9rF3TrWkGR_lLNg",authDomain:"stemp-tour.firebaseapp.com",projectId:"stemp-tour",storageBucket:"stemp-tour.firebasestorage.app",messagingSenderId:"823116268455",appId:"1:823116268455:web:4b060bf808eae664f62c82"};
const db=getFirestore(initializeApp(cfg));
const EMOJIS=['🏯','⛩️','🌸','🎋','🎎','🏔️','🗿','🌊','🎏','🏮','🌺','🎐','⚡','🌙','🎍','🔮','🌈','🦋','🐉','🌿','🍃','🔔','🎯','🏺','🎴','⭐','🎑','🌅','🦁','🐯'];
const COLORS=['#c0392b','#b8860b','#2d6a4f','#1565c0','#6a1b9a','#e65100','#00838f','#37474f'];
function ss(id){document.querySelectorAll('.state').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function se(msg){document.getElementById('error-msg').textContent=msg;ss('state-error');}
function fmtDate(iso){const d=new Date(iso);return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${d.getHours()<12?'오전':'오후'} ${d.getHours()%12||12}:${String(d.getMinutes()).padStart(2,'0')}`;}
const p=new URLSearchParams(location.search);
const locId=p.get('id'),locName=decodeURIComponent(p.get('name')||''),locIdx=parseInt(p.get('idx')||'0');
async function init(){
  const uid=localStorage.getItem('stampUID');
  if(!uid){location.href=`login.html?redirect=${encodeURIComponent(location.href)}`;return;}
  if(!locId||!locName){se('올바른 QR코드를 스캔해주세요.');return;}
  try{
    const[locSnap,coursesSnap,locsSnap]=await Promise.all([getDoc(doc(db,'locations',locId)),getDocs(collection(db,'courses')),getDocs(collection(db,'locations'))]);
    const locData=locSnap.exists()?locSnap.data():null;
    const courses=[];coursesSnap.forEach(d=>courses.push({id:d.id,...d.data()}));
    const allLocs={};locsSnap.forEach(d=>allLocs[d.id]={id:d.id,...d.data()});
    const stampRef=doc(db,'participants',uid,'stamps',locId);
    const partRef=doc(db,'participants',uid);
    const[stampSnap,partSnap]=await Promise.all([getDoc(stampRef),getDoc(partRef)]);
    if(!partSnap.exists()){location.href=`login.html?redirect=${encodeURIComponent(location.href)}`;return;}
    const isNew=!stampSnap.exists();
    const now=new Date().toISOString();
    const visitorName=localStorage.getItem('stampVisitorName')||'방문자';
    await updateDoc(partRef,{updatedAt:now});
    if(isNew){await setDoc(stampRef,{locId,locName,visitedAt:now});await updateDoc(partRef,{visitCount:increment(1),updatedAt:now});}
    const mySnap=await getDocs(collection(db,'participants',uid,'stamps'));
    const myStamps={};mySnap.forEach(d=>myStamps[d.id]=d.data());
    // Courses containing this location
    const relCourses=courses.filter(c=>(c.locationIds||[]).includes(locId));
    if(relCourses.length){
      document.getElementById('course-section').style.display='block';
      const cont=document.getElementById('course-cards');cont.innerHTML='';
      relCourses.forEach((c,ci)=>{
        const color=COLORS[ci%COLORS.length];
        const ids=c.locationIds||[];
        const cnt=ids.filter(id=>myStamps[id]).length;
        const total=ids.length;
        const pct=total?Math.round(cnt/total*100):0;
        const done=cnt>=total&&total>0;
        const card=document.createElement('div');card.className='course-card'+(done?' completed':'');
        const chips=ids.slice(0,10).map(id=>{const l=allLocs[id];const d=!!myStamps[id];const cur=id===locId;return`<span class="spot-chip${d?' done':''}${cur?' cur':''}">${cur?'📍 ':''}${l?.name||id}</span>`;}).join('');
        card.innerHTML=`<div class="cc-header"><div class="cc-dot" style="background:${color}"></div><span class="cc-name">${c.name}</span>${done?'<span class="cc-done-chip">🏆 완주</span>':''}</div><div class="cc-bar-row"><div class="cc-bar"><div class="cc-bar-fill" data-pct="${pct}" style="width:0%"></div></div><span class="cc-bar-label">${cnt}/${total}</span></div><div class="spot-chips">${chips}${ids.length>10?`<span class="spot-chip">+${ids.length-10}곳</span>`:''}</div>`;
        cont.appendChild(card);
      });
      requestAnimationFrame(()=>requestAnimationFrame(()=>document.querySelectorAll('.cc-bar-fill').forEach(el=>el.style.width=el.dataset.pct+'%')));
    }
    document.getElementById('stamp-emoji').textContent=EMOJIS[locIdx%EMOJIS.length];
    document.getElementById('loc-name-text').textContent=locName;
    document.getElementById('loc-desc-text').textContent=locData?.desc||'';
    document.getElementById('visitor-label').innerHTML=`<strong>${visitorName}</strong> 님의 방문`;
    document.getElementById('stamp-time-text').textContent=fmtDate(isNew?now:stampSnap.data().visitedAt);
    document.getElementById('badge-wrap').innerHTML=isNew?'<div class="badge badge-new">인증 완료</div>':'<div class="badge badge-dup">이미 방문한 곳이에요</div>';
    ss('state-success');
  }catch(e){se('오류가 발생했습니다. 다시 시도해주세요.');console.error(e);}
}
init();
</script>
</body>
</html>
