<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스탬프 인증</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1208;--paper:#f5efe3;--aged:#e8dcc8;--seal:#c0392b;--gold:#b8860b;--green:#2d6a4f;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Noto Sans KR',sans-serif;position:relative;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 15% 85%,rgba(192,57,43,.07) 0%,transparent 40%),radial-gradient(circle at 85% 15%,rgba(184,134,11,.09) 0%,transparent 40%);pointer-events:none;}

  .card{background:white;border-radius:12px;padding:44px 36px 36px;max-width:420px;width:94%;text-align:center;box-shadow:0 8px 48px rgba(26,18,8,.14),0 0 0 1px var(--aged);position:relative;animation:cardIn .6s cubic-bezier(.16,1,.3,1) both;}
  @keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}
  .card::before{content:'';position:absolute;top:10px;left:10px;right:10px;bottom:10px;border:1px solid rgba(232,220,200,.6);border-radius:8px;pointer-events:none;}

  .state{display:none;}.state.active{display:block;}

  /* Spinner */
  .spinner{width:44px;height:44px;border:3px solid var(--aged);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 18px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:.88rem;color:#7a6a50;}

  /* Name input */
  #state-name h2{font-family:'Noto Serif KR',serif;font-size:1.25rem;color:var(--ink);margin-bottom:8px;}
  #state-name .sub{font-size:.82rem;color:#7a6a50;margin-bottom:22px;line-height:1.6;}
  .name-input{width:100%;padding:12px 16px;border:1.5px solid var(--aged);border-radius:6px;font-family:'Noto Sans KR',sans-serif;font-size:1rem;color:var(--ink);background:var(--paper);text-align:center;margin-bottom:10px;transition:border-color .2s;}
  .name-input:focus{outline:none;border-color:var(--gold);}
  .btn-confirm{width:100%;padding:12px;background:var(--seal);color:white;border:none;border-radius:6px;font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:600;cursor:pointer;letter-spacing:.05em;transition:all .2s;}
  .btn-confirm:hover{background:#a93226;}
  .btn-confirm:disabled{background:#ccc;cursor:not-allowed;}
  .input-error{font-size:.74rem;color:var(--seal);margin-top:5px;display:none;}

  /* Success */
  .stamp-wrap{position:relative;display:inline-block;margin-bottom:20px;}
  .stamp-icon{width:92px;height:92px;background:var(--seal);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.6rem;margin:0 auto;box-shadow:0 4px 20px rgba(192,57,43,.35);animation:stampIn .5s .2s cubic-bezier(.34,1.56,.64,1) both;position:relative;}
  @keyframes stampIn{from{opacity:0;transform:scale(.3) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}
  .stamp-icon::after{content:'';position:absolute;inset:-5px;border:2.5px dashed rgba(192,57,43,.35);border-radius:50%;animation:spinSlow 8s linear infinite;}
  @keyframes spinSlow{to{transform:rotate(360deg)}}
  .confetti{position:absolute;top:50%;left:50%;pointer-events:none;}
  .confetti span{position:absolute;width:6px;height:6px;border-radius:50%;animation:burst .6s .3s cubic-bezier(0,.9,.57,1) both;}
  .confetti span:nth-child(1){background:var(--gold);--angle:0deg}.confetti span:nth-child(2){background:var(--seal);--angle:45deg}.confetti span:nth-child(3){background:var(--gold);--angle:90deg}.confetti span:nth-child(4){background:var(--green);--angle:135deg}.confetti span:nth-child(5){background:var(--gold);--angle:180deg}.confetti span:nth-child(6){background:var(--seal);--angle:225deg}.confetti span:nth-child(7){background:var(--gold);--angle:270deg}.confetti span:nth-child(8){background:var(--green);--angle:315deg}
  @keyframes burst{from{transform:rotate(var(--angle)) translateY(0) scale(0);opacity:1}to{transform:rotate(var(--angle)) translateY(-58px) scale(1);opacity:0}}

  .verified-badge{display:inline-flex;align-items:center;gap:5px;background:#e8f5e9;color:var(--green);border:1px solid #a5d6a7;border-radius:20px;padding:4px 14px;font-size:.74rem;font-weight:500;margin-bottom:12px;animation:fadeUp .4s .5s both;}
  .verified-badge::before{content:'✓';font-weight:700;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .already-badge{display:inline-block;background:#fff3e0;color:#e65100;border:1px solid #ffcc80;border-radius:20px;padding:3px 13px;font-size:.74rem;margin-bottom:12px;}
  .loc-name{font-family:'Noto Serif KR',serif;font-size:1.55rem;font-weight:700;color:var(--ink);margin-bottom:5px;animation:fadeUp .4s .6s both;}
  .loc-desc{font-size:.81rem;color:#7a6a50;margin-bottom:4px;animation:fadeUp .4s .7s both;}
  .visitor-label{font-size:.79rem;color:#aaa;margin-bottom:16px;animation:fadeUp .4s .75s both;}
  .visitor-label strong{color:#7a6a50;}
  .stamp-time{font-size:.73rem;color:#bbb;letter-spacing:.04em;margin-bottom:20px;animation:fadeUp .4s .8s both;}

  /* Course progress cards */
  .course-section{animation:fadeUp .4s .85s both;margin-bottom:18px;}
  .course-section-title{font-size:.76rem;color:#7a6a50;letter-spacing:.08em;margin-bottom:10px;text-align:left;}
  .course-cards{display:flex;flex-direction:column;gap:8px;}
  .course-card{background:var(--paper);border:1px solid var(--aged);border-radius:8px;padding:12px 14px;text-align:left;position:relative;overflow:hidden;}
  .course-card.completed{border-color:rgba(184,134,11,.5);background:linear-gradient(135deg,#fffbef,var(--paper));}
  .course-card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .course-tag{font-size:.67rem;font-weight:600;letter-spacing:.05em;padding:2px 8px;border-radius:10px;background:rgba(26,18,8,.07);color:#7a6a50;}
  .course-card.completed .course-tag{background:rgba(184,134,11,.15);color:var(--gold);}
  .course-name{font-family:'Noto Serif KR',serif;font-size:.9rem;font-weight:600;color:var(--ink);flex:1;}
  .course-completed-badge{font-size:.7rem;background:var(--gold);color:white;padding:2px 8px;border-radius:10px;white-space:nowrap;}
  .course-bar-row{display:flex;align-items:center;gap:8px;}
  .course-bar{flex:1;height:5px;background:var(--aged);border-radius:3px;overflow:hidden;}
  .course-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--seal));transition:width 1s .9s cubic-bezier(.16,1,.3,1);width:0%;}
  .course-bar-label{font-size:.72rem;color:#7a6a50;white-space:nowrap;}
  .remaining-spots{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
  .spot-chip{font-size:.64rem;padding:2px 7px;border-radius:10px;border:1px solid var(--aged);color:#7a6a50;background:white;}
  .spot-chip.done{background:#e8f5e9;border-color:#a5d6a7;color:var(--green);}
  .spot-chip.current{background:rgba(192,57,43,.08);border-color:rgba(192,57,43,.3);color:var(--seal);font-weight:600;}

  /* Mypage button */
  .btn-mypage{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--ink);color:var(--paper);border:none;border-radius:8px;font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:600;cursor:pointer;letter-spacing:.05em;animation:fadeUp .4s 1s both;transition:background .2s;text-decoration:none;}
  .btn-mypage:hover{background:var(--seal);}
  .btn-mypage .arrow{transition:transform .2s;}
  .btn-mypage:hover .arrow{transform:translateX(3px);}

  /* Error */
  .err-icon{font-size:2.8rem;margin-bottom:14px;}
  #state-error h2{font-family:'Noto Serif KR',serif;font-size:1.15rem;color:var(--ink);margin-bottom:7px;}
  #state-error p{font-size:.83rem;color:#7a6a50;}
</style>
</head>
<body>
<div class="card">
  <div class="state active" id="state-loading">
    <div class="spinner"></div>
    <p class="loading-text">인증 준비 중...</p>
  </div>

  <div class="state" id="state-name">
    <h2>처음 방문이신가요?</h2>
    <p class="sub">스탬프 기록에 사용할<br>이름(닉네임)을 입력해주세요.</p>
    <input class="name-input" type="text" id="visitor-name-input" placeholder="예: 홍길동" maxlength="20"/>
    <div class="input-error" id="name-error">이름을 입력해주세요.</div>
    <button class="btn-confirm" id="btn-confirm" onclick="confirmName()">확인</button>
  </div>

  <div class="state" id="state-success">
    <div class="stamp-wrap">
      <div class="stamp-icon" id="stamp-emoji">🏮</div>
      <div class="confetti"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    </div>
    <div id="already-notice" style="display:none"><div class="already-badge">이미 방문한 곳이에요</div></div>
    <div id="new-notice"><div class="verified-badge">인증 완료</div></div>
    <div class="loc-name" id="loc-name-text"></div>
    <div class="loc-desc" id="loc-desc-text"></div>
    <div class="visitor-label" id="visitor-label"></div>
    <div class="stamp-time" id="stamp-time-text"></div>

    <!-- Course progress -->
    <div class="course-section" id="course-section" style="display:none">
      <div class="course-section-title">📍 코스 진행 현황</div>
      <div class="course-cards" id="course-cards"></div>
    </div>

    <a class="btn-mypage" id="btn-mypage" href="#">
      <span>📖 마이페이지</span><span class="arrow">→</span>
    </a>
  </div>

  <div class="state" id="state-error">
    <div class="err-icon">⚠️</div>
    <h2>인식 오류</h2>
    <p id="error-msg">올바른 스탬프 투어 QR코드를 스캔해주세요.</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAW13Cf2qQnsGWYiAdz9rF3TrWkGR_lLNg",
  authDomain: "stemp-tour.firebaseapp.com",
  projectId: "stemp-tour",
  storageBucket: "stemp-tour.firebasestorage.app",
  messagingSenderId: "823116268455",
  appId: "1:823116268455:web:4b060bf808eae664f62c82"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const EMOJIS=['🏯','⛩️','🌸','🎋','🎎','🏔️','🗿','🌊','🎏','🏮','🌺','🎐','⚡','🌙','🎍','🔮','🌈','🦋','🐉','🌿','🍃','🔔','🎯','🏺','🎴','⭐','🎑','🌅','🦁','🐯'];

function showState(id){document.querySelectorAll('.state').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showError(msg){document.getElementById('error-msg').textContent=msg||'오류가 발생했습니다.';showState('state-error');}
function formatDate(iso){const d=new Date(iso);return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${d.getHours()<12?'오전':'오후'} ${d.getHours()%12||12}:${String(d.getMinutes()).padStart(2,'0')}`;}

// UID
function getUID(){let u=localStorage.getItem('stampUID');if(!u){u='U'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).substr(2,4).toUpperCase();localStorage.setItem('stampUID',u);}return u;}

const params=new URLSearchParams(location.search);
const locId=params.get('id');
const locName=decodeURIComponent(params.get('name')||'');
const locIdx=parseInt(params.get('idx')||'0');
let visitorName=localStorage.getItem('stampVisitorName');
let locData=null;
let allCourses=[];
let allLocations=[];

async function init(){
  if(!locId||!locName){showError('올바른 QR코드를 스캔해주세요.');return;}
  try{
    const [locSnap,coursesSnap,locsSnap]=await Promise.all([
      getDoc(doc(db,'locations',locId)),
      getDocs(collection(db,'courses')),
      getDocs(collection(db,'locations'))
    ]);
    if(locSnap.exists()) locData=locSnap.data();
    coursesSnap.forEach(d=>allCourses.push({id:d.id,...d.data()}));
    locsSnap.forEach(d=>allLocations.push({id:d.id,...d.data()}));

    if(!visitorName){
      showState('state-name');
      setTimeout(()=>document.getElementById('visitor-name-input').focus(),300);
    } else {
      await doStamp();
    }
  } catch(e){showError('네트워크 오류. 다시 시도해주세요.');console.error(e);}
}

window.confirmName=async function(){
  const input=document.getElementById('visitor-name-input').value.trim();
  if(!input){document.getElementById('name-error').style.display='block';return;}
  document.getElementById('name-error').style.display='none';
  document.getElementById('btn-confirm').disabled=true;
  visitorName=input;
  localStorage.setItem('stampVisitorName',visitorName);
  showState('state-loading');
  await doStamp();
};
document.getElementById('visitor-name-input').addEventListener('keydown',e=>{if(e.key==='Enter')window.confirmName();});

async function doStamp(){
  const uid=getUID();
  const stampRef=doc(db,'participants',uid,'stamps',locId);
  const participantRef=doc(db,'participants',uid);
  try{
    const [stampSnap,participantSnap]=await Promise.all([getDoc(stampRef),getDoc(participantRef)]);
    const isNew=!stampSnap.exists();
    const now=new Date().toISOString();

    if(!participantSnap.exists()){
      await setDoc(participantRef,{name:visitorName,uid,createdAt:now,updatedAt:now,visitCount:0,applied:false});
    } else {
      await updateDoc(participantRef,{name:visitorName,updatedAt:now});
    }
    if(isNew){
      await setDoc(stampRef,{locId,locName,visitedAt:now});
      await updateDoc(participantRef,{visitCount:increment(1),updatedAt:now});
    }

    // Load all my stamps
    const myStampsSnap=await getDocs(collection(db,'participants',uid,'stamps'));
    const myStamps={};
    myStampsSnap.forEach(d=>myStamps[d.id]=d.data());

    // Build course progress
    renderCourseProgress(myStamps,locId);

    // UI
    document.getElementById('stamp-emoji').textContent=EMOJIS[locIdx%EMOJIS.length];
    document.getElementById('loc-name-text').textContent=locName;
    document.getElementById('loc-desc-text').textContent=locData?.desc||'';
    document.getElementById('visitor-label').innerHTML=`<strong>${visitorName}</strong> 님의 방문`;
    document.getElementById('stamp-time-text').textContent=formatDate(isNew?now:stampSnap.data().visitedAt);
    if(!isNew){document.getElementById('already-notice').style.display='block';document.getElementById('new-notice').style.display='none';}

    // Mypage link
    document.getElementById('btn-mypage').href=`mypage.html?uid=${uid}`;

    showState('state-success');

    // Animate bars
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      document.querySelectorAll('.course-bar-fill').forEach(el=>{
        el.style.width=el.dataset.pct+'%';
      });
    }));
  } catch(e){showError('저장 중 오류가 발생했습니다.');console.error(e);}
}

function renderCourseProgress(myStamps,currentLocId){
  // Find courses that contain this location
  const relevantCourses=allCourses.filter(c=>(c.locationIds||[]).includes(currentLocId));
  if(!relevantCourses.length) return;

  document.getElementById('course-section').style.display='block';
  const container=document.getElementById('course-cards');
  container.innerHTML='';

  relevantCourses.forEach(course=>{
    const locIds=course.locationIds||[];
    const visited=locIds.filter(id=>myStamps[id]);
    const remaining=locIds.filter(id=>!myStamps[id]);
    const total=locIds.length;
    const count=visited.length;
    const pct=total>0?Math.round(count/total*100):0;
    const isComplete=count>=total&&total>0;

    const card=document.createElement('div');
    card.className='course-card'+(isComplete?' completed':'');

    // Spot chips (show all, max 12)
    const displayLocs=locIds.slice(0,12).map(id=>{
      const loc=allLocations.find(l=>l.id===id);
      const name=loc?.name||id;
      const done=!!myStamps[id];
      const isCurrent=id===currentLocId;
      return `<span class="spot-chip${done?' done':''}${isCurrent?' current':''}">${isCurrent?'📍 ':done?'':''}${name}</span>`;
    }).join('');
    const moreCount=locIds.length-12;

    card.innerHTML=`
      <div class="course-card-header">
        <span class="course-tag">코스</span>
        <span class="course-name">${course.name}</span>
        ${isComplete?'<span class="course-completed-badge">🏆 완주</span>':''}
      </div>
      <div class="course-bar-row">
        <div class="course-bar"><div class="course-bar-fill" data-pct="${pct}" style="width:0%"></div></div>
        <span class="course-bar-label">${count}/${total}</span>
      </div>
      <div class="remaining-spots" style="margin-top:8px">
        ${displayLocs}
        ${moreCount>0?`<span class="spot-chip">+${moreCount}곳</span>`:''}
      </div>`;
    container.appendChild(card);
  });
}

init();
</script>
</body>
</html>
